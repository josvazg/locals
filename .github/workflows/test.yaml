name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest] # macos-latest won't work in CI, but works locally

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v30

      - name: Run Mage Tests
        run: nix --extra-experimental-features 'nix-command flakes' develop path:. -c mage -v test
